      }
      @media (prefers-color-scheme: light) {
        html { background-color: #ffffff; }

        #app-placeholder .placeholder-summary { color: oklch(0.208 0 0); }
      }
      @media (prefers-color-scheme: dark) {
        html { background-color: #1d1d1d; }
        #app-placeholder { color: #e8e8e8; background-color: #1d1d1d; }
        #app-placeholder h1 { color: oklch(0.68 0.213 277); }
        #app-placeholder .placeholder-role { color: oklch(0.961 0 0); }
        #app-placeholder .placeholder-summary { color: oklch(0.847 0 0); }
      }
      html.dark { background-color: #1d1d1d !important; }
      html.dark #app-placeholder { color: #e8e8e8; background-color: #1d1d1d; }
      html.dark #app-placeholder h1 { color: oklch(0.68 0.213 277); }
      html.dark #app-placeholder .placeholder-role { color: oklch(0.961 0 0); }

      html.light { background-color: #ffffff !important; }
      html.light #app-placeholder { color: #1d1d1d; }
      html.light #app-placeholder h1 { color: oklch(0.55 0.180 45); }
      html.light #app-placeholder .placeholder-role { color: oklch(0.145 0 0); }
      html.light #app-placeholder .placeholder-summary { color: oklch(0.208 0 0); }
      @media (min-width: 640px) {
        #app-placeholder { padding: 64.5px 48px 33.178px 48px; }
        #app-placeholder .placeholder-content { max-width: 540px; }
        #app-placeholder h1 { font-size: 32px; }
        #app-placeholder .placeholder-role { font-size: 21px; }
        #app-placeholder .placeholder-summary { font-size: 17px; }
      }
      @media (min-width: 1024px) {
        #app-placeholder { padding: 80px 64px 33.178px 64px; }
        #app-placeholder .placeholder-content { max-width: 720px; }
        #app-placeholder h1 { font-size: 36px; }
        #app-placeholder .placeholder-role { font-size: 22px; }
        #app-placeholder .placeholder-summary { font-size: 18px; }
      }
      @media (min-width: 1280px) {
        #app-placeholder { padding: 80px 80px 33.178px 80px; }
        #app-placeholder .placeholder-content { max-width: 800px; }
      }
    </style>
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        if (stored) {
          var color = stored === 'dark' ? '#1d1d1d' : '#ffffff';
          document.documentElement.className = stored;
          document.documentElement.style.backgroundColor = color;
          var meta = document.querySelector('meta[name="theme-color"]:not([media])');
          if (!meta) {
            meta = document.createElement('meta');
            meta.name = 'theme-color';
            document.head.appendChild(meta);
          }
          meta.content = color;
        }
      })();
    </script>
