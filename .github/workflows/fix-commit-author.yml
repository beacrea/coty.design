name: Fix Commit Author

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check and fix Replit-authored commits
        run: |
          WRONG_EMAIL="51382616-beasles@users.noreply.replit.com"
          CORRECT_NAME="Coty Beasley"
          CORRECT_EMAIL="beacrea@users.noreply.github.com"

          BAD_COUNT=$(git log --format='%ae' HEAD | grep -c "$WRONG_EMAIL" || true)

          if [ "$BAD_COUNT" -eq 0 ]; then
            echo "All commits have correct author. No action needed."
            exit 0
          fi

          echo "Found $BAD_COUNT commit(s) with incorrect Replit author. Fixing..."

          git config user.name "$CORRECT_NAME"
          git config user.email "$CORRECT_EMAIL"

          FILTER_BRANCH_SQUELCH_WARNING=1 git filter-branch -f --env-filter "
            if [ \"\$GIT_AUTHOR_EMAIL\" = \"$WRONG_EMAIL\" ]; then
              export GIT_AUTHOR_NAME=\"$CORRECT_NAME\"
              export GIT_AUTHOR_EMAIL=\"$CORRECT_EMAIL\"
              export GIT_COMMITTER_NAME=\"$CORRECT_NAME\"
              export GIT_COMMITTER_EMAIL=\"$CORRECT_EMAIL\"
            fi
          " -- --all

          git push --force-with-lease origin main
          echo "Fixed $BAD_COUNT commit(s) with incorrect author."
